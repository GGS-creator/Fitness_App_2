name: forge
description: Forge — Local-first fitness tracker

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Local DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # State
  provider: ^6.1.1

  # Charts
  fl_chart: ^0.66.2

  # Calendar
  table_calendar: ^3.1.2

  # Media
  image_picker: ^1.1.2

  # Storage
  path_provider: ^2.1.4

  # Export/Share
  share_plus: ^9.0.0

  # Date formatting
  intl: ^0.19.0

  # Fonts
  google_fonts: ^6.2.1

  # ID generation
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.10.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/aa.png"

flutter:
  uses-material-design: true